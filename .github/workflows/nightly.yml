name: Beta (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build beta artifacts without publishing a GitHub release
        required: false
        type: boolean
        default: true
      target_ref:
        description: Branch, tag, or SHA to package (defaults to the dispatched ref)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: nightly-manual
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Beta Tag
    runs-on: ubuntu-latest
    env:
      FREECLI_NIGHTLY_TARGET_REF: ${{ inputs.target_ref || github.ref_name }}
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      target_commitish: ${{ steps.sha.outputs.target_commitish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.FREECLI_NIGHTLY_TARGET_REF }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve target commit-ish
        id: sha
        run: |
          echo "target_commitish=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve beta tag
        id: tag
        run: |
          TAG_NAME="$(node scripts/resolve-nightly-tag.mjs)"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  release:
    name: Release Beta
    needs: resolve
    uses: ./.github/workflows/release.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}
      tag_name: ${{ needs.resolve.outputs.tag_name }}
      target_commitish: ${{ needs.resolve.outputs.target_commitish }}
